  <!-- theme controller -->
  <div class="fixed top-[200px] lg:top-[300px] transition-all duration-300 right-[-50px] hover:right-0 z-4xl">
    <button
      class="theme-controller w-90px h-10 bg-200 bg-gradient-secondary hover:bg-[-100%] rounded-l-full text-whiteColor px-10px flex items-center transition-all duration-300 font-sora">
      <svg xmlns="http://www.w3.org/2000/svg" class="mr-10px w-5 block dark:hidden" viewBox="0 0 512 512">
        <path
          d="M160 136c0-30.62 4.51-61.61 16-88C99.57 81.27 48 159.32 48 248c0 119.29 96.71 216 216 216 88.68 0 166.73-51.57 200-128-26.39 11.49-57.38 16-88 16-119.29 0-216-96.71-216-216z"
          fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="32"></path>
      </svg>
      <span class="text-base block dark:hidden">Dark</span>

      <svg xmlns="http://www.w3.org/2000/svg" class="hidden mr-10px w-5 dark:block" viewBox="0 0 512 512">
        <path fill="none" stroke="currentColor" stroke-linecap="round" stroke-miterlimit="10" stroke-width="32"
          d="M256 48v48M256 416v48M403.08 108.92l-33.94 33.94M142.86 369.14l-33.94 33.94M464 256h-48M96 256H48M403.08 403.08l-33.94-33.94M142.86 142.86l-33.94-33.94">
        </path>
        <circle cx="256" cy="256" r="80" fill="none" stroke="currentColor" stroke-linecap="round" stroke-miterlimit="10"
          stroke-width="32"></circle>
      </svg>
      <span class="text-base hidden dark:block">Light</span>
    </button>
  </div>
  <!-- start: Back To Top -->
  <div class="progress-wrap" id="scrollUp">
    <svg class="progress-circle svg-content" width="100%" height="100%" viewBox="-1 -1 102 102">
      <path d="M50,1 a49,49 0 0,1 0,98 a49,49 0 0,1 0,-98" />
    </svg>
  </div>

  <!-- header area  -->
  <app-header></app-header>
  <div class="main-wrapper">
    <!-- breadcrumb -->
    <section>
      <div
        class="hero-breadcurmb pt-150px md:pt-40 lg:pt-200px pb-50px md:pb-60px lg:b-100px bg-[url('../img/breadcrumb/breadcrumb-bg.jpg')] bg-cover bg-center bg-no-repeat relative z-1 after:absolute after:top-0 after:left-0 after:w-full after:h-full after:bg-primary-color-light after:-z-1 after:opacity-70">
        <div class="container">
          <div class="flex flex-col items-center">
            <h1 class="text-size-35 md:text-size-40 lg:text-size-50 font-bold text-white-color mb-15px">
              Service Details
            </h1>
            <!-- breadcrumbs -->
            <ul class="nav flex items-center gap-x-10px">
              <li class="nav_item group relative">
                <a [routerLink]="['/']"
                  class="font-medium text-white-color capitalize relative z-0 after:w-0 after:h-1px after:bg-white-color after:absolute after:left-0 after:bottom-0 after:transition-all after:duration-500 group-hover:after:w-full">Home
                </a>
              </li>
              <li class="nav_item group relative">
                <p class="font-medium text-white-color capitalize relative flex items-center gap-10px">
                  <i class="far fa-long-arrow-right"></i> Service Details
                </p>
              </li>
            </ul>
          </div>
        </div>
      </div>
    </section>
    <!-- service details area -->
    <section id="blogs">
      <div class="py-60px md:py-20 lg:py-100px xl:py-30 dark:bg-black-color">
        <div class="container">
          <div class="lg:grid lg:gap-6 lg:grid-cols-12">
            <!-- service details -->
            <div class="lg:col-start-1 lg:col-span-8">
              <div *ngIf="service; else notFound" class="group relative flex flex-col items-center wow fadeInUp" data-wow-delay=".3s">
                <div class="rounded-lg relative overflow-hidden">
                  <div class="rounded-t-lg overflow-hidden">
                    <img [src]="service.image" [alt]="service.title" />
                  </div>

                  <div class="pt-30px md:pt-10">
                    <div class="transition-all duration-500">
                      <div class="relative z-0">
                        <div class="relative z-10">
                          <h3 class="mb-15px md:mb-5">
                            <span
                              class="text-primary-color-light dark:text-white-color capitalize relative z-0 text-size-35 md:text-size-40 lg:text-size-45 font-bold">
                              {{ service.title }}
                            </span>
                          </h3>

                          <p class="text-primary-color-light dark:text-white-color mb-15px md:mb-5">
                            {{ service.description }}
                          </p>
                          <p class="text-primary-color-light dark:text-white-color mb-15px md:mb-5">
                            <strong>Competences:</strong>
                          </p> 
                          <ul class="grid gap-x-5 md:gap-x-30px grid-col1 sm:grid-cols-2">
                              <li *ngFor="let competences of service.competences"
                                class="pl-25px mb-10px relative before:content-['\f00c'] before:font-fontawesome before:absolute before:left-0 before:top-0 before:text-primary-color before:font-bold">
                                <span class="text-primary-color-light dark:text-white-color">
                                  {{ competences }}
                                </span>
                              </li>
                           </ul>                          
                          
                          <!-- process -->
                          <div>
                            <h3 class="mb-15px md:mb-5">
                              <span
                                class="text-primary-color-light dark:text-white-color capitalize relative z-0 text-size-22 md:text-3xl font-bold">
                                <p>Service Process</p>
                              </span>
                            </h3>
                            <p class="text-primary-color-light dark:text-white-color mb-15px md:mb-5">
                              {{ service.description1 }}
                            </p>

                            <ul class="grid gap-x-5 md:gap-x-30px grid-col1 sm:grid-cols-2">
                              <li *ngFor="let details of service.details"
                                class="pl-25px mb-10px relative before:content-['\f00c'] before:font-fontawesome before:absolute before:left-0 before:top-0 before:text-primary-color before:font-bold">
                                <span class="text-primary-color-light dark:text-white-color">
                                  {{ details }}
                                </span>
                              </li>
                            </ul>
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
              <ng-template #notFound>
                <div class="text-center text-red-500 text-xl font-bold py-10">Service not found.</div>
              </ng-template>
            </div>
            <!-- sidebar -->
            <div
              class="sidebar lg:col-start-9 lg:col-span-4 pt-50px lg:pt-0 mt-10 lg:mt-0 border-t border-border-color dark:border-gray-color-3 lg:border-none">
              <div class="flex flex-col gap-30px">
                <!-- All Services -->
                <div
                  class="px-15px md:px-25px py-30px bg-cream-light-color dark:bg-primary-color-light rounded-lg wow fadeInUp"
                  data-wow-delay=".3s">
                  <h3
                    class="mb-25px text-primary-color dark:text-white-color uppercase relative z-0 text-size-lg md:text-xl font-bold">
                    Categories
                  </h3>
                  <!-- list -->

                  <ul class="sidebar-categories">
                    <li class="mb-2" *ngFor="let item of services" [class.active]="item.id === serviceId">
                      <button type="button" (click)="selectService(item.id)"
                        [attr.aria-current]="item.id === serviceId ? 'page' : null"
                        class="px-5 pt-15px pb-3 rounded-lg hover:bg-seondary-color text-primary-color-light dark:text-white-color hover:text-white-color transition-all duration-500 flex items-center justify-between gap-x-5 w-full group">
                        <span class="inline-flex gap-1 items-start text-left">
                          <i [class]="item.icon + ' mr-10px text-size-25 leading-1'"></i>
                          {{ item.title }}
                        </span>
                        <span
                          class="text-primary-color-light dark:text-white-color group-hover:text-white-color leading-1 transition-none duration-500">
                          <i class="fas fa-angle-right"></i>
                        </span>
                      </button>
                    </li>
                  </ul>
                </div>
                <!-- get in tuouch -->
                <div
                  class="px-15px md:px-25px py-30px bg-cream-light-color dark:bg-primary-color-light rounded-lg wow fadeInUp"
                  data-wow-delay=".3s">
                  <form>
                    <h3
                      class="mb-25px text-primary-color dark:text-white-color uppercase relative z-0 text-size-lg md:text-xl font-bold">
                      Get in Touch
                    </h3>
                    <div class="flex flex-col gap-10px">
                      <!-- name -->
                      <div>
                        <input 
                          type="text" 
                          id="contactName"
                          name="name"
                          placeholder="Name *"
                          required
                          class="text-white-color w-full px-5 py-14px border border-gray-color-3 bg-cream-light-color dark:bg-black-color focus:border-primary-color rounded-lg outline-none focus:outline-none transition-all duration-300 placeholder:text-gray-color leading-1" />
                      </div>
                      <!-- email -->
                      <div>
                        <input 
                          type="email" 
                          id="contactEmail"
                          name="email"
                          placeholder="Email *"
                          required
                          class="text-white-color w-full px-5 py-14px border border-gray-color-3 bg-cream-light-color dark:bg-black-color focus:border-primary-color rounded-lg outline-none focus:outline-none transition-all duration-300 placeholder:text-gray-color leading-1" />
                      </div>
                      <!-- message -->
                      <div>
                        <textarea 
                          cols="1" 
                          rows="10" 
                          id="contactMessage"
                          name="message"
                          placeholder="Your Message *"
                          required
                          class="text-white-color w-full px-5 py-14px border border-gray-color-3 bg-cream-light-color dark:bg-black-color focus:border-primary-color rounded-lg outline-none focus:outline-none transition-all duration-300 placeholder:text-gray-color leading-1"></textarea>
                      </div>
                      <div class="sm:col-start-1 sm:col-span-2">
                        <button 
                          type="button"
                          onclick="
                            // Récupérer les données du formulaire
                            const name = document.getElementById('contactName').value || '';
                            const email = document.getElementById('contactEmail').value || '';
                            const message = document.getElementById('contactMessage').value || '';
                            
                            // Validation simple
                            if (!name.trim() || !email.trim() || !message.trim()) {
                              alert('Veuillez remplir tous les champs obligatoires.');
                              return;
                            }
                            
                            // Validation email
                            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                            if (!emailRegex.test(email)) {
                              alert('Veuillez saisir une adresse email valide.');
                              return;
                            }
                            
                            // Désactiver le bouton
                            this.disabled = true;
                            this.innerHTML = '<span>Sending...</span>';
                            
                            const sendEmail = () => {
                              // Générer timestamp
                              const now = new Date();
                              const timeString = now.toLocaleString('fr-FR', {
                                year: 'numeric',
                                month: 'long',
                                day: 'numeric',
                                hour: '2-digit',
                                minute: '2-digit'
                              });
                              
                              window.emailjs.send('service_fwj1q64', 'template_iv7uowd', {
                                name: name,
                                from_email: email,
                                message: message + '\n\n--- Message envoyé depuis la page Service Details ---',
                                phone: '',
                                service: 'Contact depuis Service Details',
                                time: timeString
                              }, 'ifofOfoggt5NaV54l').then(result => {
                                alert('✅ Votre message a été envoyé avec succès ! Je vous répondrai dans les plus brefs délais.');
                                
                                // Réinitialiser le formulaire
                                document.getElementById('contactName').value = '';
                                document.getElementById('contactEmail').value = '';
                                document.getElementById('contactMessage').value = '';
                                
                                // Réactiver le bouton
                                this.disabled = false;
                                this.innerHTML = '<span>Send Message</span>';
                                
                              }).catch(error => {
                                alert('❌ Une erreur est survenue lors de l\'envoi. Veuillez réessayer.');
                                
                                // Réactiver le bouton
                                this.disabled = false;
                                this.innerHTML = '<span>Send Message</span>';
                              });
                            };
                            
                            // Charger EmailJS si nécessaire
                            if (!window.emailjs) {
                              const script = document.createElement('script');
                              script.src = 'https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js';
                              script.onload = () => {
                                window.emailjs.init('ifofOfoggt5NaV54l');
                                sendEmail();
                              };
                              script.onerror = () => {
                                alert('❌ Erreur de chargement. Veuillez réessayer.');
                                this.disabled = false;
                                this.innerHTML = '<span>Send Message</span>';
                              };
                              document.head.appendChild(script);
                            } else {
                              sendEmail();
                            }
                          "
                          class="text-size-15 font-bold text-white-color capitalize py-17px px-35px bg-200 bg-gradient-secondary hover:bg-[-100%] rounded-full leading-1 transition-all duration-300 w-full text-center disabled:opacity-50 disabled:cursor-not-allowed">
                          <span>Send Message</span>
                        </button>
                      </div>
                    </div>
                  </form>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </div>

  <!-- footer area -->
  <app-footer></app-footer>
